<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#1A3C6E"/>
  
  <!-- Subtle gradient overlay -->
  <defs>
    <radialGradient id="grad1" cx="20%" cy="20%" r="60%">
      <stop offset="0%" style="stop-color:#FF6B00;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#1A3C6E;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="grad2" cx="80%" cy="80%" r="50%">
      <stop offset="0%" style="stop-color:#0d7377;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#1A3C6E;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#grad1)"/>
  <rect width="1200" height="630" fill="url(#grad2)"/>
  
  <!-- Left accent bar -->
  <rect x="80" y="80" width="4" height="470" fill="#FF6B00" opacity="0.6"/>
  
  <!-- Top label -->
  <text x="108" y="130" font-family="Georgia, serif" font-size="18" font-weight="400" 
        letter-spacing="4" fill="#EBF3FB" opacity="0.6" text-transform="uppercase">SHINA SALAKO</text>
  
  <!-- Main headline -->
  <text x="108" y="230" font-family="Georgia, serif" font-size="68" font-weight="700" 
        fill="#FFFFFF" letter-spacing="-1">Books.</text>
  <text x="108" y="318" font-family="Georgia, serif" font-size="68" font-weight="700" 
        fill="#FFFFFF" letter-spacing="-1">Programmes.</text>
  <text x="108" y="406" font-family="Georgia, serif" font-size="68" font-weight="700" 
        fill="#FF6B00" letter-spacing="-1">Diagnostics.</text>
  
  <!-- Tagline -->
  <text x="108" y="480" font-family="Georgia, serif" font-size="22" font-weight="400" 
        fill="#EBF3FB" opacity="0.75" font-style="italic">
    For founders, fleet leaders, and the season you are building through.
  </text>
  
  <!-- Domain -->
  <text x="108" y="548" font-family="Georgia, serif" font-size="18" font-weight="400" 
        fill="#EBF3FB" opacity="0.5" letter-spacing="2">shinasalako.com</text>
  
  <!-- Right side decorative element -->
  <circle cx="950" cy="315" r="180" fill="none" stroke="#EBF3FB" stroke-width="1" opacity="0.06"/>
  <circle cx="950" cy="315" r="130" fill="none" stroke="#FF6B00" stroke-width="1" opacity="0.08"/>
  <circle cx="950" cy="315" r="80" fill="none" stroke="#EBF3FB" stroke-width="1" opacity="0.06"/>
  
  <!-- Three dots representing three books -->
  <circle cx="920" cy="315" r="8" fill="#FF6B00" opacity="0.7"/>
  <circle cx="950" cy="315" r="8" fill="#EBF3FB" opacity="0.7"/>
  <circle cx="980" cy="315" r="8" fill="#0d7377" opacity="0.7"/>
</svg>